spring.application.name=movie-booking
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/movie_booking
spring.datasource.username=turvisoni
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=verify
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.com.xyz.booking=DEBUG